name: WhiteBox CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: whitebox-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/my_project_database?schema=public
  SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/my_project_database_shadow?schema=public
  API_PORT: 3001
  FRONTEND_ORIGIN: http://localhost:3000
  JWT_SECRET: ci-jwt-secret-change-only-in-github-actions-32chars
  JWT_EXPIRES_IN: 15m
  JWT_REFRESH_EXPIRES_DAYS: 7
  NEXT_PUBLIC_API_URL: http://localhost:3001/api
  NEXT_PUBLIC_YANDEX_MAPS_API_KEY: ""
  YANDEX_GEOCODER_API_KEY: ""

jobs:
  verify:
    name: Full verification
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: my_project_database
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d my_project_database"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Create Prisma shadow database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d my_project_database -tc "SELECT 1 FROM pg_database WHERE datname = 'my_project_database_shadow'" | grep -q 1 || \
          PGPASSWORD=postgres psql -h localhost -U postgres -d my_project_database -c "CREATE DATABASE my_project_database_shadow"

      - name: Apply migrations to CI database
        run: npm run db:migrate

      - name: Run full checks
        run: npm run ci:verify

  production-migrate:
    name: Apply production migrations
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      DIRECT_URL: ${{ secrets.PRODUCTION_DIRECT_URL || secrets.PRODUCTION_DATABASE_URL }}
      JWT_SECRET: production-migration-job-does-not-sign-runtime-tokens
      NEXT_PUBLIC_API_URL: https://whitebox-api-production.up.railway.app/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate production DB secret
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "PRODUCTION_DATABASE_URL GitHub secret is required."
            exit 1
          fi

      - name: Apply migrations to production database
        run: npm run db:migrate

      - name: Deployment handoff
        run: |
          echo "Production migrations are applied."
          echo "Railway should deploy whitebox-api and whitebox-web from main after this workflow is green."
