services:
  postgres:
    image: postgres:16-alpine
    container_name: whitebox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: my_project_database
    ports:
      - "5432:5432"
    volumes:
      - whitebox-postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d my_project_database"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  whitebox-postgres-data:
